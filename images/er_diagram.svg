<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 480" width="780" height="480">
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#444"/>
    </marker>
  </defs>
  <!-- Background -->
  <rect width="780" height="480" fill="#f8f9fa" rx="8"/>

  <!-- Title -->
  <text x="390" y="32" text-anchor="middle" font-family="Arial" font-size="18" font-weight="bold" fill="#1a237e">ER Diagram – E-Commerce Feedback System</text>

  <!-- CUSTOMERS entity -->
  <rect x="30" y="60" width="200" height="210" rx="6" fill="#fff" stroke="#1565c0" stroke-width="2.5"/>
  <rect x="30" y="60" width="200" height="36" rx="6" fill="#1565c0"/>
  <rect x="30" y="90" width="200" height="6" fill="#1565c0"/>
  <text x="130" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">customers</text>
  <text x="45" y="116" font-family="Arial" font-size="12" fill="#c62828">PK  customer_id  INT</text>
  <line x1="30" y1="124" x2="230" y2="124" stroke="#e0e0e0"/>
  <text x="45" y="142" font-family="Arial" font-size="12" fill="#333">    name         VARCHAR(100)</text>
  <line x1="30" y1="150" x2="230" y2="150" stroke="#e0e0e0"/>
  <text x="45" y="168" font-family="Arial" font-size="12" fill="#333">    email        VARCHAR(150)</text>
  <line x1="30" y1="176" x2="230" y2="176" stroke="#e0e0e0"/>
  <text x="45" y="194" font-family="Arial" font-size="12" fill="#333">    region       VARCHAR(50)</text>
  <line x1="30" y1="202" x2="230" y2="202" stroke="#e0e0e0"/>
  <text x="45" y="222" font-family="Arial" font-size="11" fill="#888">    UNIQUE (email)</text>
  <line x1="30" y1="230" x2="230" y2="230" stroke="#e0e0e0"/>
  <text x="45" y="252" font-family="Arial" font-size="10" fill="#888" font-style="italic">    idx: region</text>

  <!-- PRODUCTS entity -->
  <rect x="290" y="60" width="210" height="210" rx="6" fill="#fff" stroke="#2e7d32" stroke-width="2.5"/>
  <rect x="290" y="60" width="210" height="36" rx="6" fill="#2e7d32"/>
  <rect x="290" y="90" width="210" height="6" fill="#2e7d32"/>
  <text x="395" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">products</text>
  <text x="305" y="116" font-family="Arial" font-size="12" fill="#c62828">PK  product_id   INT</text>
  <line x1="290" y1="124" x2="500" y2="124" stroke="#e0e0e0"/>
  <text x="305" y="142" font-family="Arial" font-size="12" fill="#333">    name         VARCHAR(150)</text>
  <line x1="290" y1="150" x2="500" y2="150" stroke="#e0e0e0"/>
  <text x="305" y="168" font-family="Arial" font-size="12" fill="#333">    category     VARCHAR(100)</text>
  <line x1="290" y1="176" x2="500" y2="176" stroke="#e0e0e0"/>
  <text x="305" y="194" font-family="Arial" font-size="12" fill="#333">    price        DECIMAL(10,2)</text>

  <!-- REVIEWS entity -->
  <rect x="540" y="60" width="220" height="330" rx="6" fill="#fff" stroke="#6a1b9a" stroke-width="2.5"/>
  <rect x="540" y="60" width="220" height="36" rx="6" fill="#6a1b9a"/>
  <rect x="540" y="90" width="220" height="6" fill="#6a1b9a"/>
  <text x="650" y="84" text-anchor="middle" font-family="Arial" font-size="14" font-weight="bold" fill="#fff">reviews</text>
  <text x="555" y="116" font-family="Arial" font-size="12" fill="#c62828">PK  review_id    INT</text>
  <line x1="540" y1="124" x2="760" y2="124" stroke="#e0e0e0"/>
  <text x="555" y="142" font-family="Arial" font-size="12" fill="#e65100">FK  customer_id  INT</text>
  <line x1="540" y1="150" x2="760" y2="150" stroke="#e0e0e0"/>
  <text x="555" y="168" font-family="Arial" font-size="12" fill="#e65100">FK  product_id   INT</text>
  <line x1="540" y1="176" x2="760" y2="176" stroke="#e0e0e0"/>
  <text x="555" y="194" font-family="Arial" font-size="12" fill="#333">    rating       TINYINT(1-5)</text>
  <line x1="540" y1="202" x2="760" y2="202" stroke="#e0e0e0"/>
  <text x="555" y="220" font-family="Arial" font-size="12" fill="#333">    comments     TEXT</text>
  <line x1="540" y1="228" x2="760" y2="228" stroke="#e0e0e0"/>
  <text x="555" y="246" font-family="Arial" font-size="12" fill="#333">    review_date  DATE</text>
  <line x1="540" y1="254" x2="760" y2="254" stroke="#e0e0e0"/>
  <text x="555" y="272" font-family="Arial" font-size="12" fill="#333">    source       VARCHAR(50)</text>
  <line x1="540" y1="280" x2="760" y2="280" stroke="#e0e0e0"/>
  <text x="555" y="300" font-family="Arial" font-size="10" fill="#888" font-style="italic">    idx: customer_id</text>
  <text x="555" y="316" font-family="Arial" font-size="10" fill="#888" font-style="italic">    idx: product_id</text>
  <text x="555" y="332" font-family="Arial" font-size="10" fill="#888" font-style="italic">    idx: rating, review_date</text>
  <line x1="540" y1="340" x2="760" y2="340" stroke="#e0e0e0"/>
  <text x="555" y="360" font-family="Arial" font-size="10" fill="#888">    CHECK rating BETWEEN 1 AND 5</text>
  <text x="555" y="376" font-family="Arial" font-size="10" fill="#888">    ON DELETE CASCADE (cust)</text>

  <!-- Relationship line: customers → reviews (1:N) -->
  <line x1="230" y1="142" x2="540" y2="142" stroke="#1565c0" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="340" y="132" font-family="Arial" font-size="11" fill="#1565c0" font-style="italic">1 ──── N</text>

  <!-- Relationship line: products → reviews (1:N) -->
  <line x1="500" y1="168" x2="540" y2="168" stroke="#2e7d32" stroke-width="1.8" stroke-dasharray="6,3" marker-end="url(#arr)"/>
  <text x="505" y="160" font-family="Arial" font-size="11" fill="#2e7d32" font-style="italic">1:N</text>

  <!-- Legend -->
  <rect x="30" y="300" width="470" height="100" rx="5" fill="#fff" stroke="#bbb" stroke-width="1"/>
  <text x="45" y="322" font-family="Arial" font-size="13" font-weight="bold" fill="#333">Legend</text>
  <rect x="45" y="332" width="12" height="12" fill="#c62828"/>
  <text x="62" y="343" font-family="Arial" font-size="11" fill="#333">PK = Primary Key</text>
  <rect x="170" y="332" width="12" height="12" fill="#e65100"/>
  <text x="187" y="343" font-family="Arial" font-size="11" fill="#333">FK = Foreign Key</text>
  <line x1="45" y1="362" x2="95" y2="362" stroke="#444" stroke-width="1.8" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="100" y="366" font-family="Arial" font-size="11" fill="#333">Relationship (dashed = FK reference)</text>
  <text x="45" y="386" font-family="Arial" font-size="11" fill="#555">Cardinality:  One customer → many reviews  |  One product → many reviews</text>

  <!-- Data sources box -->
  <rect x="30" y="416" width="720" height="48" rx="5" fill="#e8f5e9" stroke="#2e7d32" stroke-width="1"/>
  <text x="45" y="435" font-family="Arial" font-size="12" font-weight="bold" fill="#2e7d32">Data Sources Integrated:</text>
  <text x="45" y="453" font-family="Arial" font-size="11" fill="#333">  customer_survey.csv (source=survey)   |   web_feedback.json (source=web)   |   external_reviews.xml (source=external)</text>
</svg>